name: expense_tracker
description: A personal expense tracking app with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_slidable: ^3.1.0
  intl: ^0.19.0
  fl_chart: ^0.68.0

  # Utils
  uuid: ^4.4.0
  equatable: ^2.0.5
  path_provider: ^2.1.2
  path: ^1.9.0

  # Media / Permissions
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  permission_handler: ^11.3.0

  # Security
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#00897B"
  adaptive_icon_foreground: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
